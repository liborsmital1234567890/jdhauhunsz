<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Přihlášení – účty Google</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Google Sans", roboto, "Noto Sans Myanmar UI", "Noto Sans Khmer", arial, sans-serif;
    background: #fff;
    color: #202124;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    border: 1px solid #dadce0;
    border-radius: 28px;
    display: flex;
    width: 100%;
    max-width: 840px;
    min-height: 400px;
    background: #fff;
    overflow: hidden;
  }

  .left-col {
    flex: 1;
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .right-col {
    flex: 1.1;
    /* Změna: Zmenšen padding (48px 40px 20px 40px) pro zmenšení mezery dole */
    padding: 48px 40px 20px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
  }

  .logo {
    width: 48px;
    height: 48px;
    margin-bottom: 24px;
    margin-top: 0;
  }

  h1 {
    font-size: 2rem;
    font-weight: 400;
    line-height: 1.25;
    margin-top: 0;
    margin-bottom: 16px;
    color: #1f1f1f;
    word-break: break-word;
  }

  .sub {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0;
    line-height: 1.5;
    margin-top: 0;
    margin-bottom: 0;
    color: #1f1f1f;
  }

  .form-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .inp {
    width: 100%;
    max-width: 360px;
    padding: 14px 16px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 16px;
    font-family: inherit;
    color: #1f1f1f;
    transition: border 0.2s;
    outline: none;
    background: #fff;
  }
  .inp:focus {
    border: 2px solid #1a73e8;
    padding: 13px 15px;
  }
  .inp::placeholder { color: #5f6368; }

  .link {
    color: #1a73e8;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    display: inline-block;
    margin-top: 4px;
  }
  .link:hover { text-decoration: underline; }

  .actions {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 16px;
    padding-top: 16px;
    width: 100%;
  }

  .create {
    color: #1a73e8;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }
  .create:hover { text-decoration: underline; }

  .btn {
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .btn:hover {
    background: #1557b0;
    box-shadow: 0 1px 3px rgba(60,64,67,0.3);
  }

  .foot {
    margin-top: 24px;
    font-size: 12px;
    color: #5f6368;
    width: 100%;
    max-width: 840px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .foot a { color: #5f6368; text-decoration: none; margin-left: 16px; }
  .foot a:hover { text-decoration: underline; }
  .lang {
    border: none;
    background: transparent;
    color: #5f6368;
    font-size: 12px;
    cursor: pointer;
    outline: none;
    font-family: inherit;
  }

  @media (max-width: 768px) {
    body {
      padding: 0;
      justify-content: flex-start;
      min-height: 100vh;
    }
    .card {
      border: none;
      border-radius: 0;
      flex-direction: column;
      max-width: 100%;
      min-height: calc(100vh - 60px);
      padding: 0;
    }
    .left-col {
      padding: 60px 24px 24px;
      align-items: flex-start;
      text-align: left; 
      flex: 0 0 auto;
    }
    .logo {
      margin-top: 0;
      margin-bottom: 20px;
    }
    .right-col {
      padding: 24px 24px 32px;
      flex: 1;
      justify-content: flex-start;
    }
    .inp {
      max-width: 100%;
    }
    .actions {
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
    }
    .foot {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 100%;
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid #dadce0;
      margin-top: 0;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start; 
    }
    .foot a { margin: 0 8px 0 0; }
    .foot div {
        display: flex;
        gap: 16px;
    }
  }
</style>
</head>
<body>

<div class="card">
  <div class="left-col">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 48" aria-hidden="true">
      <path fill="#4285F4" d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z"></path>
      <path fill="#34A853" d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z"></path>
      <path fill="#FABB05" d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z"></path>
      <path fill="#E94235" d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z"></path>
    </svg>
    <h1>Přihlaste se</h1>
    <p class="sub">pomocí účtu Google. Účet bude k dispozici pro ostatní aplikace od Googlu v prohlížeči.</p>
  </div>

  <div class="right-col">
    <div class="form-area">
      <input type="text" class="inp" placeholder="E-mail nebo telefon" autofocus>
      <a href="https://accounts.google.com/signin/recovery" class="link">Zapomněli jste e-mail?</a>
    </div>

    <div class="actions">
      <a href="https://accounts.google.com/signup" class="create">Vytvořit účet</a>
      <button class="btn">Další</button>
    </div>
  </div>
</div>

<div class="foot">
  <select class="lang">
    <option>Čeština</option>
    <option>English (United States)</option>
    <option>Deutsch</option>
    <option>Français</option>
    <option>Español</option>
    <option>Slovenčina</option>
    <option>Polski</option>
  </select>
  <div>
    <a href="https://support.google.com/accounts?hl=cs&p=account_iph">Nápověda</a>
    <a href="https://accounts.google.com/TOS?loc=CZ&hl=cs&privacy=true">Ochrana soukromí</a>
    <a href="https://accounts.google.com/TOS?loc=CZ&hl=cs">Podmínky</a>
  </div>
</div>

</body>
</html>
